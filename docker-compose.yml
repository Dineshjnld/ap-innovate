version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ap-innovate-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ap_innovate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ap_innovate"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: ap-innovate-api
    restart: always
    ports:
      - "80:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-password}@db:5432/ap_innovate
      - JWT_SECRET=${JWT_SECRET:-ap-police-innovation-hub-secret-2026}
      - PORT=3001
      - CORS_ORIGIN=*
      - NODE_ENV=production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
