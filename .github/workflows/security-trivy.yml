name: Security - Trivy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  trivy-fs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1

      - name: Build app image
        run: docker build -t ap-innovate:${{ github.sha }} .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ap-innovate:${{ github.sha }}
          scanners: vuln,secret,misconfig
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1
