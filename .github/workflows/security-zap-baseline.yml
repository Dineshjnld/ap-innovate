name: Security - ZAP Baseline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Public URL to scan, for example https://example.gov.in
        required: true
        type: string
  schedule:
    - cron: "30 2 * * *"

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || vars.ZAP_TARGET_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate target URL
        run: |
          if [ -z "$TARGET_URL" ]; then
            echo "Set workflow input target_url or repository variable ZAP_TARGET_URL"
            exit 1
          fi

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          target: ${{ env.TARGET_URL }}
          rules_file_name: .zap/rules.tsv
          cmd_options: "-a"
          allow_issue_writing: false
          fail_action: true
